name: CI

on:
  push:
    branches: ["main"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ------------------------------------------------------------------ #
  # Job 1 — test & lint (runs on every push and PR)                     #
  # ------------------------------------------------------------------ #
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

  # ------------------------------------------------------------------ #
  # Job 2 — build & push to GHCR (main branch and version tags)        #
  # No external secrets — uses the automatic GITHUB_TOKEN.             #
  # ------------------------------------------------------------------ #
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # branch push → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # version tag v1.2.3 → :1.2.3  :1.2  :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # always tag the exact commit SHA
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ------------------------------------------------------------------ #
  # Job 3 — create GitHub Release (version tags only)                  #
  # ------------------------------------------------------------------ #
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'

    permissions:
      contents: write   # required to create a release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # needed for --generate-notes to find previous tag

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION:  ${{ github.ref_name }}
          IMAGE:    ${{ env.IMAGE }}
          DIGEST:   ${{ needs.build.outputs.digest }}
        run: |
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            --notes "## Docker image

          Pull the image for this release:
          \`\`\`
          docker pull ${IMAGE}:${VERSION}
          \`\`\`

          Or pin to the exact digest:
          \`\`\`
          docker pull ${IMAGE}@${DIGEST}
          \`\`\`"
