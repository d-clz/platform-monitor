# Fill in base64-encoded values before applying.
# Example:  echo -n 'glpat-xxxx' | base64
apiVersion: v1
kind: Secret
metadata:
  name: ci-monitor-secrets
  namespace: platform-cicd
type: Opaque
data:
  # GitLab Personal Access Token (read_api scope)
  GITLAB_TOKEN: ""
  # SMTP credentials (leave empty if auth is not required)
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
