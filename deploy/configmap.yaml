apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-monitor-config
  namespace: platform-cicd
data:
  config.yaml: |
    thresholds:
      tokenAgeWarningDays: 60
      tokenAgeCriticalDays: 90
      runnerStalenessMinutes: 10
      pipelineFailureWindow: "24h"

    alerting:
      enableEmail: false
      smtpHost: ""
      smtpPort: 587
      senderAddress: ""
      recipientAddresses: []

    gitlabBaseURL: "https://gitlab.example.com"
    gitlabGroupID: 0  # set to your GitLab group numeric ID to enable auto-discovery
