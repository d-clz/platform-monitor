apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-monitor-config
  namespace: platform-cicd
data:
  config.yaml: |
    thresholds:
      tokenAgeWarningDays: 60
      tokenAgeCriticalDays: 90
      runnerStalenessMinutes: 10
      pipelineFailureWindow: "24h"

    alerting:
      enableEmail: false
      smtpHost: ""
      smtpPort: 587
      senderAddress: ""
      recipientAddresses: []

    gitlabBaseURL: "https://gitlab.example.com"

    # Each entry declares one application to monitor.
    # name        — used to match OCP service accounts and namespaces by naming convention
    #               (e.g. "pfm" → looks for pfm-image-builder SA, pfm-* namespaces)
    # gitlabGroupID — numeric ID of the app's GitLab sub-group;
    #                 repos (projects) within that group are auto-discovered
    apps:
      - name: pfm
        gitlabGroupID: 10
      - name: crm
        gitlabGroupID: 20
      - name: fin
        gitlabGroupID: 30
